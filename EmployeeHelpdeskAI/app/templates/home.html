{% extends "base.html" %}

{% block content %}

<div class="row">

    <div class="col-lg-8 mx-auto">

        <div class="card shadow">

            <div class="card-header">

                <h4>💬 Employee Helpdesk AI</h4>

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">

                        Ask your question

                    </label>

                    <textarea
                        id="prompt"
                        class="form-control"
                        rows="4"
                        placeholder="Example: Explain the leave policy"></textarea>

                </div>

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">

                            Model

                        </label>

                        <select
                            id="model"
                            class="form-select">

                            <option value="demo-model">

                                Demo Model

                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Temperature

                        </label>

                        <input
                            id="temperature"
                            class="form-control"
                            type="number"
                            step="0.1"
                            min="0"
                            max="2"
                            value="0.7">

                    </div>

                </div>

                <button
                    id="sendButton"
                    class="btn btn-primary mt-4"
                    onclick="sendPrompt()">

                    Send

                </button>

            </div>

        </div>

        <div class="card shadow mt-4">

            <div class="card-header">

                AI Response

            </div>

            <div class="card-body">

                <div id="chatHistory" class="chat-history">

                    <div class="text-muted text-center">

                        Start a conversation by asking a question.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
